[mgr]
show_hidden = true

[opener]
edit = [
    { run = 'nvim "$@"', block = true, desc = "Neovim" },
]
play = [
    { run = 'mpv "$@"', orphan = true, desc = "MPV" },
]

[open]
rules = [
    { name = "*.txt", use = "edit" },
    { name = "*.mkv", use = "play" },
    { name = "*", use = [ "edit", "play" ] }
]

[preview]
# Note: In newer Yazi versions, use 'preview_image_scheme'
preview_image_scheme = "kitty"
image_filter = "lanczos3"
image_quality = 90
max_width = 1500
max_height = 1500

[plugin]
previewers = [
    # PDF
    { mime = "application/pdf", run = "pdf" },
    # Images
    { mime = "image/*", run = "image" },
    # JSON/ToML/etc (Default syntax highlighting)
    { mime = "{application,text}/{json,x-toml,x-yaml}", run = "code" },
    # Fallback for text files
    { mime = "text/*", run = "code" },
]
