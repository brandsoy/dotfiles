# Unbind and rebind r for reloading configuration
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded!"

# Terminal and pass through settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides '*:Se=\e[1 q'
set -gq allow-passthrough

# Window naming
set-option -g set-titles on
set-option -g set-titles-string "#W"
set-window-option -g automatic-rename on
set-option -g allow-rename on

# Prefix key
set -g prefix C-s

# Enable mouse support
set -g mouse on

# Use vi keys for copy mode
set-window-option -g mode-keys vi

# Pane navigation shortcuts
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Status bar configuration
set-option -g status-position top
set -g status-style bg=default

# Display window index and name in the status-left
set -g status-left "[#I] #W "

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# Catppuccin theme and plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.3'

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"

# TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin "tmux-plugins/tmux-battery"
set -g @plugin "tmux-plugins/tmux-cpu"
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

