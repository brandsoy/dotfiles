# Reload config with C-s r
# TPM plugin reload/update with C-s I / C-s U
# Clean plugins C-s alt+u

# Unbind and rebind r for reloading configuration
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded!"

# Enable escape sequence passthrough
set -gq allow-passthrough all  # Required for tmux 3.3+[4][6]
set -g default-terminal "tmux-256color"  # Better terminal emulation[1][3]
set-option -ga terminal-overrides ",xterm-256color:Tc"
set -g visual-activity off

# Prefix key (standard C-b)
set -g prefix C-s

# Enable mouse support
set -g mouse on

# Use vi keys for copy mode
set-window-option -g mode-keys vi

# Pane navigation shortcuts
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Start window numbering at 1
set-option -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1


# Catppuccin specific
# Make the status line pretty and add some modules
set -g @plugin 'catppuccin/tmux#v2.1.3' # See https://github.com/catppuccin/tmux/tags for additional tags
set -g @catppuccin_flavor 'mocha' # latte, frappe, macchiato or mocha
set -g @catppuccin_window_status_style "rounded"

set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
set -g status-right "#{E:@catppuccin_status_application}"
set -agF status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -ag status-right "#{E:@catppuccin_status_uptime}"
set -agF status-right "#{E:@catppuccin_status_battery}"



# TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @continuum-restore 'on'


#tmux-zap
set -g @plugin 'AleckAstan/tmux-zap'
set -g @zap_key 's'
set -g @zap_width '50%'
set -g @zap_height '40%'




# # Tmux-Dotbar theme
# set -g @plugin 'vaaleyard/tmux-dotbar'
# set -g @tmux-dotbar-right true

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

# Status bar configuration
# set -g status-style bg=default
set-option -g status-position top
