# Unbind and rebind r for reloading configuration
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded!"

# Terminal and passthrough settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides '*:Se=\e[1 q'

set -gq allow-passthrough

# Prefix key
set -g prefix C-s

# Enable mouse support
set -g mouse on

# Use vi keys for copy mode
set-window-option -g mode-keys vi

# Pane navigation shortcuts
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Status bar configuration
set-option -g status-position top
set -g status-style bg=default

# Display window index and name in the status-left
set -g status-left "[#I] #W "

# Catppuccin theme and plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux#v2.1.3'

set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

run ~/.config/tmux/plugins/catppuccin/tmux/catppuccin.tmux

# Status right modules
set -g status-right-length 100
set -g status-right "#{E:@catppuccin_status_application} #{E:@catppuccin_status_cpu} #{E:@catppuccin_status_session} #{E:@catppuccin_status_uptime} #{E:@catppuccin_status_battery}"

# TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'

# Initialize TPM
run '~/.tmux/plugins/tpm/tpm'

