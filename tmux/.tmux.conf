# Unbind and rebind r for reloading configuration
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded!"

# Terminal and pass through settings
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides '*:Se=\e[1 q'
set -gq allow-passthrough
set -g visual-activity off

# Prefix key
set -g prefix C-s

# Enable mouse support
set -g mouse on

# Use vi keys for copy mode
set-window-option -g mode-keys vi

# Pane navigation shortcuts
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Status bar configuration
set-option -g status-position bottom
set -g status-style bg=default

# Start window numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# plugins
set -g @plugin 'christoomey/vim-tmux-navigator'


# Kanagawa theme
# https://github.com/Nybkox/tmux-kanagawa
set -g @plugin 'Nybkox/tmux-kanagawa'
set -g @kanagawa-theme 'wave'
set -g @kanagawa-ignore-window-colors true
set -g @kanagawa-plugins "cpu-usage ram-usage"
set -g @kanagawa-show-flags true
set -g @kanagawa-show-powerline true
set -g @kanagawa-show-edge-icons true
set -g @kanagawa-show-left-icon "#h | #S"
set -g @kanagawa-cpu-usage-label " "
set -g @kanagawa-ram-usage-label " "
set -g @kanagawa-git-show-current-symbol ✓

