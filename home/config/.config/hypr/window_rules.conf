##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Workspace assignments for external and internal displays
# Assign workspaces 1-9 to external display if available, otherwise to laptop
workspace = 1,monitor:DP-2,DP-3,eDP-1
workspace = 2,monitor:DP-2,DP-3,eDP-1
workspace = 3,monitor:DP-2,DP-3,eDP-1
workspace = 4,monitor:DP-2,DP-3,eDP-1
workspace = 5,monitor:DP-2,DP-3,eDP-1
workspace = 6,monitor:DP-2,DP-3,eDP-1
workspace = 7,monitor:DP-2,DP-3,eDP-1
workspace = 8,monitor:DP-2,DP-3,eDP-1
workspace = 9,monitor:DP-2,DP-3,eDP-1

# Assign workspace 10 to laptop display only
workspace = 10,monitor:eDP-1

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
