# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf

###################
### SOURCE FILES ###
###################

source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/programs.conf
source = ~/.config/hypr/autostart.conf
source = ~/.config/hypr/env.conf
source = ~/.config/hypr/permissions.conf
source = ~/.config/hypr/look_and_feel.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/window_rules.conf
# source = ~/.config/hypr/hyprlock.conf
# source = ~/.config/hypr/hypridle.conf

# Monitor event listener for workspace reconfiguration on hotplug
exec-on-monitor-add = ~/.config/hypr/scripts/monitor_workspace_setup.sh
exec-on-monitor-remove = ~/.config/hypr/scripts/monitor_workspace_setup.sh
# This exports your theme settings to the rest of the system
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Papirus-Dark'
# exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark' # Or your choice
