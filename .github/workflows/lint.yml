name: Lint

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "."
          severity: warning

  stow-dry-run:
    name: Stow dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install stow
        run: sudo apt-get install -y stow

      - name: Simulate stow (shared)
        run: |
          mkdir -p /tmp/fake-home
          stow --no-folding --simulate --target=/tmp/fake-home --dir=. shared

      - name: Simulate stow (linux)
        run: |
          stow --no-folding --simulate --target=/tmp/fake-home --dir=. linux
