# ==============================================================================
# Core Settings
# Startup commands, normalization, and general behavior
# ==============================================================================

start-at-login = true
after-login-command = []

# # JankyBorders: https://github.com/FelixKratz/JankyBorders
# after-startup-command = [
#     'exec-and-forget borders active_color=0xcc9d7cd8 inactive_color=0xcc1a1b26 width=8.0',
# ]

# Normalizations: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# Default Layout
accordion-padding = 30
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'
automatically-unhide-macos-hidden-apps = true

# Mouse Behavior
# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']


# ==============================================================================
# Key Mapping
# ==============================================================================

[key-mapping]
preset = 'qwerty'


# ==============================================================================
# Gaps
# Inner gaps between windows, outer gaps from monitor edges
# ==============================================================================

[gaps]
inner.horizontal = 5
inner.vertical = 5
outer.bottom = 5
outer.top = [{ monitor.main = 5 }, 5]
outer.right = 5
outer.left = 5


# ==============================================================================
# Main Keybindings
# ==============================================================================

[mode.main.binding]

# --- App Launchers ---
alt-enter = 'exec-and-forget open -a /Applications/kitty.app'

# --- Focus Navigation (Wrap-around) ---
alt-h = 'focus --boundaries-action wrap-around-the-workspace left'
alt-j = 'focus --boundaries-action wrap-around-the-workspace down'
alt-k = 'focus --boundaries-action wrap-around-the-workspace up'
alt-l = 'focus --boundaries-action wrap-around-the-workspace right'

alt-left = 'focus --boundaries-action wrap-around-the-workspace left'
alt-down = 'focus --boundaries-action wrap-around-the-workspace down'
alt-up = 'focus --boundaries-action wrap-around-the-workspace up'
alt-right = 'focus --boundaries-action wrap-around-the-workspace right'

# --- Move Windows ---
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# --- Layout Modification ---
alt-e = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-f = 'fullscreen'
alt-shift-space = 'layout floating tiling'
alt-y = ['focus right', 'join-with down', 'layout tiles horizontal'] # Join focused window with the one to the right into a horizontal tile
alt-b = 'balance-sizes'
alt-r = 'flatten-workspace-tree'

# --- Stack/Join Windows ---
alt-shift-left = 'join-with left'
alt-shift-down = 'join-with down'
alt-shift-up = 'join-with up'
alt-shift-right = 'join-with right'

# --- Resize Windows (coarse: ±100) ---
alt-shift-minus = 'resize smart -100'
alt-shift-equal = 'resize smart +100'

# --- Workspace Navigation ---
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-s = 'workspace 0'

alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# --- Move Windows to Workspaces ---
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-s = 'move-node-to-workspace 0'

# --- Enter Sub-Modes ---
alt-shift-semicolon = 'mode service'
alt-shift-r = 'mode resize'


# ==============================================================================
# Extra Modes (Service, Resize)
# ==============================================================================

# Service Mode
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

# Resize Mode (fine: ±50)
[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
minus = 'resize smart -50'
equal = 'resize smart +50'
enter = 'mode main'
esc = 'mode main'


# ==============================================================================
# Window Rules (Callbacks)
# Workspace assignments and floating window overrides
# ==============================================================================

# --- Browsers -> Workspace 1 ---
[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = ['move-node-to-workspace 1']

# --- Terminals -> Workspace 2 ---
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'net.kovidgoyal.kitty'
run = ['move-node-to-workspace 2']

# --- Communication -> Workspace 0 ---
[[on-window-detected]]
if.app-id = 'com.microsoft.Outlook'
run = ['move-node-to-workspace 0']

[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = ['move-node-to-workspace 0']

# --- Floating Windows ---
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Passwords'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'dev.kdrag0n.MacVirt'
run = ['layout floating']


# ==============================================================================
# Monitor Configuration
# Force workspace-to-monitor assignments
# ==============================================================================

[workspace-to-monitor-force-assignment]
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'main'
0 = 'main'
5 = 'secondary'
6 = 'secondary'
