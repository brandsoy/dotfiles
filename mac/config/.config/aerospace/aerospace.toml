# AUTO-GENERATED — edit files in config/ then run ./build.sh

# Core Settings
# Startup commands, normalization, and general behavior

after-login-command = []

# JankyBorders: https://github.com/FelixKratz/JankyBorders
after-startup-command = [
    'exec-and-forget borders active_color=0xcc9d7cd8 inactive_color=0xcc1a1b26 width=8.0',
]

start-at-login = true

# Normalizations: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

accordion-padding = 0
default-root-container-layout = 'tiles'
default-root-container-orientation = 'auto'

# Mouse follows focus when focused monitor changes
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

automatically-unhide-macos-hidden-apps = true

[key-mapping]
preset = 'qwerty'

# Gaps
# Inner gaps between windows, outer gaps from monitor edges

[gaps]
inner.horizontal = 10
inner.vertical = 10
outer.bottom = 10
outer.top = [{ monitor.main = 10 }, 10]
outer.right = 10
outer.left = 10

# Main Keybindings

[mode.main.binding]

# App launchers
alt-enter = 'exec-and-forget open -a /Applications/kitty.app'

# Focus (wrap-around like Hyprland)
alt-h = 'focus --boundaries-action wrap-around-the-workspace left'
alt-j = 'focus --boundaries-action wrap-around-the-workspace down'
alt-k = 'focus --boundaries-action wrap-around-the-workspace up'
alt-l = 'focus --boundaries-action wrap-around-the-workspace right'

alt-left = 'focus --boundaries-action wrap-around-the-workspace left'
alt-down = 'focus --boundaries-action wrap-around-the-workspace down'
alt-up = 'focus --boundaries-action wrap-around-the-workspace up'
alt-right = 'focus --boundaries-action wrap-around-the-workspace right'

# Move windows
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'

# Layout
alt-e = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-f = 'fullscreen'
alt-shift-space = 'layout floating tiling'
alt-y = ['focus right', 'join-with down', 'layout tiles horizontal']
alt-b = 'balance-sizes'
alt-r = 'flatten-workspace-tree'

# Stack/join windows
alt-shift-left = 'join-with left'
alt-shift-down = 'join-with down'
alt-shift-up = 'join-with up'
alt-shift-right = 'join-with right'

# Resize
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

# Workspaces
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'
alt-s = 'workspace 0'

# Move windows to workspaces
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-0 = 'move-node-to-workspace 0'

# Workspace navigation
alt-tab = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# Enter modes
alt-shift-semicolon = 'mode service'
alt-shift-r = 'mode resize'

# Extra Modes (service, resize)

# Service mode
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main']
f = ['layout floating tiling', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

# Resize mode (like Hyprland submap)
[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
minus = 'resize smart -50'
equal = 'resize smart +50'
enter = 'mode main'
esc = 'mode main'

# Window Rules
# Workspace assignments and floating window overrides

# Workspace 1 - Browsers
[[on-window-detected]]
if.app-id = 'com.firefox.Firefox'
run = ['move-node-to-workspace 1']

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = ['move-node-to-workspace 1']

# Workspace 2 - Terminals
[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = ['move-node-to-workspace 2']

[[on-window-detected]]
if.app-id = 'net.kovidgoyal.kitty'
run = ['move-node-to-workspace 2']

# Workspace 0 - Communication
[[on-window-detected]]
if.app-id = 'com.microsoft.Outlook'
run = ['move-node-to-workspace 5']

[[on-window-detected]]
if.app-id = 'com.microsoft.teams2'
run = ['move-node-to-workspace 5']

# Floating windows
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Passwords'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'dev.kdrag0n.MacVirt'
run = ['layout floating']

# Monitor Configuration
# Force workspace-to-monitor assignments

[workspace-to-monitor-force-assignment]
1 = 'main'
2 = 'main'
3 = 'main'
4 = 'main'
5 = 'secondary'

