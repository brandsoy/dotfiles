# tmux config optimized for kitty on a macOS laptop
# Reload config: Prefix r
# TPM install/update: Prefix I / Prefix U

##### Core behavior #####

# Prefix key. If C-s ever freezes the terminal, add `stty -ixon` to your shell rc.
unbind C-b
set -g prefix C-s
bind C-s send-prefix

# Reload configuration
unbind r
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Faster escape handling for Vim/Neovim while keeping Alt/Meta usable.
set -s escape-time 10

# Keep windows/panes numbered naturally.
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# macOS laptop ergonomics
set -g mouse on
set -g visual-activity off
set -g focus-events on
set -g status-position top

##### Kitty / terminal integration #####

# Inside tmux, advertise tmux's own terminal. Keep kitty as TERM outside tmux.
set -g default-terminal "tmux-256color"

# True color, clipboard, focus, title, and hyperlink support when tmux runs in kitty.
# tmux 3.6 understands terminal-features; terminal-overrides is kept as fallback.
set -as terminal-features ",xterm-kitty:RGB:clipboard:focus:title:hyperlinks"
set -as terminal-features ",xterm-256color:RGB:clipboard:focus:title:hyperlinks"
set -ga terminal-overrides ",xterm-kitty:RGB"
set -ga terminal-overrides ",xterm-256color:RGB"

# Let tmux and apps use OSC 52 clipboard and kitty graphics/protocol passthrough.
set -g set-clipboard on
set -g allow-passthrough all

# Better modified-key handling in kitty/modern terminals.
set -g extended-keys always
set -g extended-keys-format csi-u

# Keep the macOS/kitty window title useful.
set -g set-titles on
set -g set-titles-string "#S:#I.#P #{pane_current_command}"

##### Panes and windows #####

# Split in the current pane's working directory.
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# Pane navigation shortcuts.
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with repeatable Vim-style keys.
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Custom tmux helper script.
bind s display-popup -E "$HOME/dotfiles/scripts/tmux/switch-window.sh"

##### Copy mode / clipboard #####

setw -g mode-keys vi

# Vim-like selection and copy to the macOS clipboard.
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Enter send -X copy-pipe-and-cancel "pbcopy"

##### Plugins #####

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @continuum-restore 'on'

##### Theme #####

# Theme colors
set -g @minimal_theme_bg_color "#1A1D23"
set -g @minimal_theme_active_color "#b4befe"
set -g @minimal_theme_inactive_color "#6c7086"
set -g @minimal_theme_text_color "#cdd6f4"
set -g @minimal_theme_accent_color "#b4befe"
set -g @minimal_theme_border_color "#44475a"

# Theme (vendored locally, no TPM plugin)
run-shell "$HOME/dotfiles/scripts/tmux/minimal-theme/minimal.tmux"

# Tmux-Dotbar theme
# set -g @plugin 'vaaleyard/tmux-dotbar'
# set -g @tmux-dotbar-right true

# Initialize TPM. Keep this at the end.
run '~/.tmux/plugins/tpm/tpm'
