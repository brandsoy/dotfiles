# macOS laptop + tmux optimized kitty config

# Performance / latency
# Keep vsync enabled on macOS for smooth rendering and lower laptop power use.
repaint_delay    10
input_delay      0
sync_to_monitor  yes

# macOS keyboard behavior
# Left Option sends Alt/Meta (great for tmux, shells, Vim/Neovim, Emacs).
# Right Option remains the normal macOS Option key for special characters.
macos_option_as_alt left
macos_quit_when_last_window_closed yes

# Font
# BEGIN_KITTY_FONTS
font_family      family="Maple Mono NF"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS
font_size 13.0
adjust_line_height 110%
disable_ligatures always

# Window
window_margin_width 4
hide_window_decorations titlebar-only
macos_show_window_title_in none
scrollback_lines 10000

# Clipboard / selection
copy_on_select clipboard
strip_trailing_spaces smart

# tmux-friendly terminal behavior
# TERM should remain xterm-kitty; install kitty's terminfo on remote hosts if needed.
term xterm-kitty
# Hold Shift while selecting/clicking to bypass tmux or full-screen terminal apps (kitty default).

# Handy macOS shortcuts (explicit, so they survive future default changes)
map cmd+c copy_to_clipboard
map cmd+v paste_from_clipboard
map cmd+k clear_terminal scroll active
map cmd+plus  change_font_size all +1.0
map cmd+minus change_font_size all -1.0
map cmd+0     change_font_size all 0
map cmd+enter toggle_fullscreen

# Theme
# BEGIN_KITTY_THEME
# Tokyo Night
include current-theme.conf
# END_KITTY_THEME
